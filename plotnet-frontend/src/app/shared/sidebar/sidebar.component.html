<aside class="w-60 min-h-screen bg-primary flex flex-col shrink-0">

  <!-- Wordmark -->
  <div class="h-14 px-5 flex items-center border-b border-secondary">
    <span class="text-sm font-bold tracking-tight text-white">PlotNet</span>
    <span class="ml-2 text-[10px] text-[#64748B] uppercase tracking-widest">Admin</span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-4 px-3">

    <p class="text-[10px] font-medium text-[#475569] uppercase tracking-widest px-2 mb-2">
      Management
    </p>

    <a
      routerLink="/admin"
      routerLinkActive="text-white border-l-2 border-accent bg-secondary"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors mb-0.5 border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <a
      routerLink="/admin/plots"
      routerLinkActive="text-white border-l-2 border-accent bg-secondary"
      class="flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors mb-0.5 border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
      Plots
    </a>

    <a
      routerLink="/admin/bookings"
      routerLinkActive="text-white border-l-2 border-accent bg-secondary"
      class="flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors mb-0.5 border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Bookings
    </a>

    <a
      routerLink="/admin/users"
      routerLinkActive="text-white border-l-2 border-accent bg-secondary"
      class="flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors mb-0.5 border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Users
    </a>

    <a
      routerLink="/admin/feedback"
      routerLinkActive="text-white border-l-2 border-accent bg-secondary"
      class="flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors mb-0.5 border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M7 8h10M7 12h6m-6 4h10M5 5h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/>
      </svg>
      User feedback
    </a>

  </nav>

  <!-- Footer: Sign out -->
  <div class="p-3 border-t border-secondary">
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-3 py-2 rounded-sm text-xs text-[#94A3B8]
             hover:text-white hover:bg-secondary transition-colors border-l-2 border-transparent">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign Out
    </button>
  </div>

</aside>
